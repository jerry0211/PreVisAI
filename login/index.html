<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PreVisAI — 로그인</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.ico" />
    <link rel="alternate icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="apple-touch-icon" href="../assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="top-bar">
      <div class="deck-tag">
        <a class="brand-mini" href="./index.html" aria-label="PreVisAI home">
          <img class="brand-mark" src="../assets/favicon.ico" alt="" aria-hidden="true" />
          <span>PreVisAI</span>
        </a>
        <span class="tag-sep">/</span>
      </div>
    </header>

    <main class="page" id="page">
      <!-- LOGIN PANEL -->
      <section class="auth-card is-active" id="loginPanel" aria-label="sign in">
        <div class="auth-brand">
          <img class="brand-mark big" src="../assets/favicon.ico" alt="" aria-hidden="true" />
          <span class="brand-word">PreVisAI</span>
        </div>

        <div class="auth-head">
          <span class="eyebrow">환영합니다</span>
          <h1>스튜디오로 로그인</h1>
          <p class="auth-sub">
            이전 작업을 이어서 진행하거나, Runway, Higgsfield, Kling용 새 PreVis 프로젝트를 시작하세요.
          </p>
        </div>

        <form class="auth-form" id="loginForm" autocomplete="on" onsubmit="return false;">
          <label class="field">
            <span class="field-label">Email</span>
            <input
              id="emailInput"
              type="email"
              placeholder="you@studio.com"
              autocomplete="email"
              required
            />
          </label>
          <label class="field">
            <span class="field-label">Password</span>
            <input
              id="passwordInput"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              minlength="6"
              required
            />
          </label>

          <div class="auth-row">
            <label class="check">
              <input type="checkbox" checked />
              <span>이 디바이스에서 사용자를 기억하기</span>
            </label>
            <a class="auth-link" href="#">비밀번호를 잊으셨습니까?</a>
          </div>
        </form>

        <div class="auth-actions">
          <button class="pill primary big" type="button" id="signInButton">
            <span class="signin-label">Continue</span>
            <span class="signin-arrow" aria-hidden="true">→</span>
            <span class="signin-spinner" aria-hidden="true"></span>
          </button>
          <p class="auth-hint" id="authHint" hidden>
            유효한 이메일 주소와 6자 이상의 비밀번호를 입력하세요.
          </p>
        </div>

        <div class="divider" aria-hidden="true"><span>or</span></div>

        <div class="auth-providers">
          <button class="pill" type="button" data-provider="google">
            <svg class="provider-icon" viewBox="0 0 18 18" aria-hidden="true">
              <path
                fill="#fff"
                d="M17.64 9.2c0-.64-.06-1.25-.17-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.27h2.92a8.78 8.78 0 0 0 2.68-6.63z"
                opacity="0.95"
              />
              <path
                fill="#fff"
                d="M9 18a8.78 8.78 0 0 0 6.04-2.17l-2.93-2.27c-.81.54-1.85.86-3.11.86-2.39 0-4.42-1.62-5.14-3.79H.83v2.38A8.99 8.99 0 0 0 9 18z"
                opacity="0.7"
              />
              <path
                fill="#fff"
                d="M3.86 10.63A5.41 5.41 0 0 1 3.58 9c0-.57.1-1.12.28-1.63V5H.83A8.99 8.99 0 0 0 0 9c0 1.45.35 2.82.83 4z"
                opacity="0.5"
              />
              <path
                fill="#fff"
                d="M9 3.58c1.32 0 2.5.45 3.43 1.34l2.58-2.58A8.95 8.95 0 0 0 9 0 8.99 8.99 0 0 0 .83 5l3.03 2.37C4.58 5.2 6.61 3.58 9 3.58z"
                opacity="0.85"
              />
            </svg>
            Continue with Google
          </button>
          <button class="pill" type="button" data-provider="sso">
            <svg class="provider-icon" viewBox="0 0 18 18" aria-hidden="true">
              <path
                d="M9 1.5l6.5 3v4.7c0 4-2.7 6.6-6.5 7.3-3.8-.7-6.5-3.3-6.5-7.3V4.5L9 1.5z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
              />
            </svg>
            스튜디오 SSO
          </button>
        </div>

        <p class="auth-foot">
          PreVisAI가 처음이신가요? <a class="auth-link" href="#">회원 가입</a>
        </p>
      </section>

    </main>

    <script src="./login.js"></script>
  </body>
</html>
