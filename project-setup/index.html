<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PreVisAI — From Script to Shot</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.ico" />
    <link rel="alternate icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="apple-touch-icon" href="../assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="./project-setup.css?v=2" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="top-bar">
      <div class="deck-tag">
        <a class="brand-mini" href="./index.html" aria-label="PreVisAI home">
          <img class="brand-mark" src="../assets/favicon.ico" alt="" aria-hidden="true" />
          <span>PreVisAI</span>
        </a>
        <span class="tag-sep">/</span>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <div class="brand-block">
          <img class="brand-mark big" src="../assets/favicon.ico" alt="" aria-hidden="true" />
          <span class="brand-word">PreVisAI</span>
        </div>

        <div class="hero-divider" aria-hidden="true"></div>

        

      </section>

      <section class="projects" aria-label="projects">
        <div class="section-head">
          <span class="eyebrow">프로젝트 라이브러리</span>
          <h2>프로젝트</h2>
          <p class="section-sub">
            각 프로젝트에는 전체 시나리오가 담깁니다. 스토리보드는 이 시나리오를 바탕으로 해석되어 프롬프트와 모션 벡터 리스트을 생성합니다.
          </p>
        </div>

        <div class="project-grid" id="projectListItems"></div>

        <button class="new-project-card" id="newProjectCard" type="button">
          <span class="plus" aria-hidden="true">+</span>
          <span class="new-project-text">
            <strong>새 프로젝트</strong>
            <small>전체 시나리오를 업로드하세요.</small>
          </span>
        </button>
      </section>
    </main>

    <dialog id="scenarioDialog" class="dialog">
      <form method="dialog" class="dialog-form">
        <header class="dialog-head">
          <div>
            <span class="eyebrow">프로젝트</span>
            <h2 id="dialogTitle">새 프로젝트</h2>
          </div>
          <button class="dialog-close" id="dialogCloseButton" type="button" aria-label="Close">
            ×
          </button>
        </header>

        <label class="field">
          <span class="field-label">프로젝트명</span>
          <input
            id="projectName"
            name="projectName"
            type="text"
            placeholder="예시: Orbital Witness"
            autocomplete="off"
          />
        </label>

        <label class="field file-field">
          <span class="field-label">시나리오 파일</span>
          <span class="file-control">
            <input
              id="scenarioFile"
              name="scenarioFile"
              type="file"
              accept=".txt,text/plain"
            />
            <span class="file-control-label">시나리오 텍스트 파일을 고르세요</span>
            <span class="file-control-hint">배경 및 플롯 정의</span>
          </span>
        </label>

        <div class="preview-card">
          <span class="preview-label">시나리오 프리뷰</span>
          <pre id="scenarioPreview">.txt 시나리오를 업로드하세요
          </pre>
        </div>

        <div class="dialog-actions">
          <button
            class="pill primary"
            id="continueButton"
            value="default"
            type="submit"
            disabled
          >
            스토리보드로 계속 <span aria-hidden="true">→</span>
          </button>
        </div>
      </form>
    </dialog>

    <script src="./project-setup.js?v=2"></script>
  </body>
</html>
