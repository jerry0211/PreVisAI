<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PreVisAI — Welcome Back</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.ico" />
    <link rel="alternate icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="apple-touch-icon" href="../assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="./welcome.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="top-bar">
      <div class="deck-tag">
        <a class="brand-mini" href="../login/index.html" aria-label="PreVisAI home">
          <img class="brand-mark" src="../assets/favicon.ico" alt="" aria-hidden="true" />
          <span>PreVisAI</span>
        </a>
        <span class="tag-sep">/</span>
      </div>
    </header>

    <main class="page">
      <section class="welcome-card" aria-label="signed in">
        <div class="welcome-orb" aria-hidden="true">
          <span class="orb-ring"></span>
          <span class="orb-core"></span>
        </div>

        <div class="welcome-head">
          <span class="eyebrow">로그인 완료</span>
          <h1>돌아오신걸 환영합니다, <span id="userGreeting">감독님</span>.</h1>
          <p>
            프로젝트 라이브러리가 준비되었습니다. 프로젝트 설정 화면으로 이동합니다.&hellip;
          </p>
        </div>

        <ul class="welcome-stats">
          <li>
            <span class="stat-label">프로젝트</span>
            <span class="stat-value" id="statProjects">3개</span>
          </li>
          <li>
            <span class="stat-label">최근 활동</span>
            <span class="stat-value">2시간 전</span>
          </li>
          <li>
            <span class="stat-label">플랜</span>
            <span class="stat-value">스튜디오</span>
          </li>
        </ul>

        <div class="redirect-track" aria-hidden="true">
          <span class="redirect-fill"></span>
        </div>
      </section>
    </main>

    <script src="./welcome.js"></script>
  </body>
</html>
