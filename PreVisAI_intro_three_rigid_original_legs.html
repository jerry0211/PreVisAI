<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PreVisAI Intro — Three Rigid Original Legs</title>
<style>
*,*::before,*::after{box-sizing:border-box} html,body{margin:0;height:100%;background:#000;overflow:hidden}
body{font-family:-apple-system,"SF Pro Display","Inter","Helvetica Neue",Arial,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
.stage::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(255,255,255,.05) 0%,rgba(255,255,255,0) 60%);pointer-events:none}
.lockup{--mark-h:clamp(140px,13.75vw,260px);--gap:34px;--cap-h:clamp(112px,11.25vw,212px);--shift:calc((var(--cap-h)*1.95 + var(--gap))/2);position:relative;display:flex;align-items:center;justify-content:center}
#mark{position:relative;height:var(--mark-h);width:calc(var(--mark-h)*1.35);display:block;animation:mark-path 5000ms cubic-bezier(.22,1,.36,1) infinite;will-change:transform}
.mark-canvas{position:relative;width:100%;height:100%;overflow:visible}
#speedlines{position:absolute;left:14.8%;top:43%;width:25.2%;height:22%;transform-origin:100% 50%;animation:speedlines-thrust 5000ms linear infinite}
.speedline{position:absolute;right:0;height:3.5%;min-height:6px;border-radius:999px;background:#fff;animation:flicker 280ms ease-in-out infinite}
#sl1{top:0;width:100%} #sl2{top:20%;width:76%;animation-delay:-90ms}
.character-wrap{position:absolute;left:45.9%;top:0;height:100%;width:auto;aspect-ratio:145/202;transform-origin:50% 55%;animation:breathe 1600ms ease-in-out infinite;animation-delay:2.4s}
.character-wrap>img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.leg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;will-change:transform}
#leg-left{transform-origin:24% 67%;animation:rigid-leg-left 5000ms ease-in-out infinite}
#leg-mid{transform-origin:48% 67%;animation:rigid-leg-mid 5000ms ease-in-out infinite}
#leg-right{transform-origin:68% 66%;animation:rigid-leg-right 5000ms ease-in-out infinite}
@keyframes mark-path{0%{transform:translate(calc(-60vw + var(--shift)),0) rotate(-6deg)}6%{transform:translate(calc(-50vw + var(--shift)),-16px) rotate(-4deg)}12%{transform:translate(calc(-40vw + var(--shift)),18px) rotate(2deg)}19%{transform:translate(calc(-28vw + var(--shift)),-22px) rotate(-3deg)}26%{transform:translate(calc(-16vw + var(--shift)),20px) rotate(4deg)}34%{transform:translate(calc(-8vw + var(--shift)),-14px) rotate(-2deg)}42%{transform:translate(calc(-2vw + var(--shift)),6px) rotate(1deg)}48%{transform:translate(var(--shift),0) rotate(0)}52%{transform:translate(var(--shift),6px) rotate(0)}58%{transform:translate(var(--shift),0) rotate(0)}70%{transform:translate(var(--shift),0) rotate(0)}77.6%{transform:translate(-6px,0) rotate(0)}92%{transform:translate(0,0) rotate(0)}99.9%{transform:translate(0,0) rotate(0)}100%{transform:translate(calc(-60vw + var(--shift)),0) rotate(-6deg)}}
@keyframes speedlines-thrust{0%{transform:scaleX(1);opacity:1}10%{transform:scaleX(1.15);opacity:1}20%{transform:scaleX(1);opacity:1}30%{transform:scaleX(1.15);opacity:1}40%,48%{transform:scaleX(1);opacity:1}55%,100%{transform:scaleX(.6);opacity:0}}
@keyframes flicker{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.015)}}
/* Exactly three original legs. Each moves as one rigid image layer. No bending, no extra legs. */
@keyframes rigid-leg-left{0%{transform:rotate(0deg)}5%{transform:rotate(12deg)}10%{transform:rotate(-10deg)}15%{transform:rotate(12deg)}20%{transform:rotate(-10deg)}25%{transform:rotate(11deg)}30%{transform:rotate(-9deg)}35%{transform:rotate(10deg)}40%{transform:rotate(-7deg)}46%{transform:rotate(5deg)}50%{transform:rotate(-4deg)}54%{transform:rotate(2deg)}58%,100%{transform:rotate(0deg)}}
@keyframes rigid-leg-mid{0%{transform:rotate(0deg)}4%{transform:rotate(-8deg)}9%{transform:rotate(8deg)}14%{transform:rotate(-8deg)}19%{transform:rotate(8deg)}24%{transform:rotate(-7deg)}29%{transform:rotate(7deg)}34%{transform:rotate(-6deg)}39%{transform:rotate(5deg)}46%{transform:rotate(-4deg)}50%{transform:rotate(3deg)}54%{transform:rotate(-1.5deg)}58%,100%{transform:rotate(0deg)}}
@keyframes rigid-leg-right{0%{transform:rotate(0deg)}5%{transform:rotate(-12deg)}10%{transform:rotate(10deg)}15%{transform:rotate(-12deg)}20%{transform:rotate(10deg)}25%{transform:rotate(-11deg)}30%{transform:rotate(9deg)}35%{transform:rotate(-10deg)}40%{transform:rotate(7deg)}46%{transform:rotate(-5deg)}50%{transform:rotate(4deg)}54%{transform:rotate(-2deg)}58%,100%{transform:rotate(0deg)}}
.wordmark{margin-left:var(--gap);font-weight:800;font-size:var(--cap-h);line-height:1;letter-spacing:-.01em;color:#fff;display:inline-flex;position:relative;white-space:nowrap}
.wordmark .glyph{display:inline-block;overflow:hidden;line-height:1;vertical-align:top}.wordmark .glyph>span{display:inline-block;transform:translateY(110%);opacity:0;animation:glyph-rise 5000ms cubic-bezier(.22,1,.36,1) infinite}
@keyframes glyph-rise{0%,72.4%{transform:translateY(110%);opacity:0}80.8%,99.9%{transform:translateY(0);opacity:1}100%{transform:translateY(110%);opacity:0}}
.wordmark .glyph:nth-child(1)>span{animation-delay:0s}.wordmark .glyph:nth-child(2)>span{animation-delay:.045s}.wordmark .glyph:nth-child(3)>span{animation-delay:.09s}.wordmark .glyph:nth-child(4)>span{animation-delay:.135s}.wordmark .glyph:nth-child(5)>span{animation-delay:.18s}.wordmark .glyph:nth-child(6)>span{animation-delay:.225s}.wordmark .glyph:nth-child(7)>span{animation-delay:.27s}.wordmark .glyph:nth-child(8)>span{animation-delay:.315s}
.shimmer{position:absolute;top:0;left:0;height:100%;width:100%;pointer-events:none;overflow:hidden;mix-blend-mode:screen;-webkit-mask-image:linear-gradient(#000,#000)}.shimmer::after{content:"";position:absolute;top:-20%;left:-40%;width:40%;height:140%;background:linear-gradient(100deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0) 35%,rgba(255,255,255,.10) 50%,rgba(255,255,255,0) 65%,rgba(255,255,255,0) 100%);transform:translateX(-50%);animation:shimmer-sweep 5000ms linear infinite}
@keyframes shimmer-sweep{0%,86%{transform:translateX(-50%);opacity:0}86.01%{opacity:1}95.6%{transform:translateX(360%);opacity:1}95.7%,100%{transform:translateX(360%);opacity:0}}
