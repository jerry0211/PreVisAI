<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>previs-AI</title>
    <link rel="stylesheet" href="./storyboard-workflow.css" />
  </head>
  <body>
    <header class="top-bar">
      <a class="brand" href="../project-setup/index.html" aria-label="previs-AI home">
        <span class="logo-placeholder" aria-hidden="true"></span>
        <span>previs-AI</span>
      </a>
      <div class="top-actions">
        <button type="button">Help</button>
        <button class="profile-placeholder" type="button" aria-label="User profile">User</button>
      </div>
    </header>

    <aside class="project-list" aria-label="projects">
      <h1>previs-AI</h1>
      <button class="project-item" id="newProjectButton">New Project</button>
      <div id="projectListItems"></div>
    </aside>

    <main class="workflow-page">
      <header>
        <h1>previs-AI</h1>
        <p id="statusPill"><span></span>Ready for storyboard image</p>
      </header>

      <section aria-label="storyboard and scenario">
        <div class="source-grid">
          <div>
            <h2>Storyboard Source</h2>
            <label class="upload-drop" for="storyboardFile">
              <input id="storyboardFile" type="file" accept="image/*" />
              <img id="storyboardPreview" alt="Storyboard image preview" />
              <span class="upload-prompt">
                <strong>Upload storyboard image</strong>
                <small>PNG, JPG, or WebP</small>
              </span>
            </label>
          </div>

          <div>
            <h2>Input Scenario</h2>
            <div class="scenario-window" id="scenarioWindow" aria-label="input scenario">
              <pre id="scenarioText">Loading scenario...</pre>
            </div>
          </div>
        </div>
      </section>

      <section aria-label="storyboard actions">
        <h2>Process</h2>
        <div class="action-row">
          <button id="analyzeButton">Analyze board</button>
          <button id="generateButton">Export vectors</button>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span id="progressBar"></span>
        </div>
      </section>

      <section class="output-grid" id="outputGrid" hidden aria-label="outputs">
        <article>
          <header>
            <h3>scene_vectors.json</h3>
            <button data-file="vectors">Download</button>
          </header>
          <pre id="vectorOutput"></pre>
        </article>
        <article>
          <header>
            <h3>video_prompt.txt</h3>
            <button data-file="prompt">Download</button>
          </header>
          <pre id="promptOutput"></pre>
        </article>
      </section>
    </main>

    <script src="./storyboard-workflow.js"></script>
  </body>
</html>
